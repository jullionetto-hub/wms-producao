<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reposição — WMS Miess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#EFF4FB; --surface:#FFFFFF; --surface2:#F5F8FD; --border:#DDE5F0;
      --accent:#2563EB; --accent2:#1D4ED8; --green:#16A34A; --red:#DC2626;
      --amber:#D97706; --indigo:#6366F1; --teal:#0D9488; --purple:#7C3AED;
      --text:#0F172A; --text2:#475569; --text3:#94A3B8;
      --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
      --sh-lg:0 8px 32px rgba(0,0,0,.09); --r:14px; --r-sm:9px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);font-size:14px}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

    /* ── HEADER ── */
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh);position:sticky;top:0;z-index:50}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-ic{width:34px;height:34px;background:linear-gradient(135deg,#2563EB,#6366F1);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
    .logo-tx{font-family:'Space Mono',monospace;font-size:14px;color:var(--text);letter-spacing:-.5px}
    .logo-tx small{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--text3);display:block;font-weight:500}

    /* ── TABS ── */
    .tabs{display:flex;gap:4px;background:var(--surface2);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
    .tab{padding:12px 18px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif}
    .tab:hover{color:var(--text2)}
    .tab.ativo{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:5px;display:inline-block}

    /* ── FUNCIONARIO BAR ── */
    #func-bar{background:linear-gradient(135deg,rgba(37,99,235,.06),rgba(99,102,241,.04));border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px}
    #func-bar label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;white-space:nowrap}
    #func-select{flex:1;max-width:320px;padding:9px 13px;background:var(--surface);border:2px solid var(--accent);border-radius:10px;color:var(--text);font-size:14px;font-weight:700;outline:none;font-family:'DM Sans',sans-serif;cursor:pointer}
    #func-nome-atual{font-size:13px;font-weight:700;color:var(--accent);padding:8px 14px;background:rgba(37,99,235,.08);border-radius:8px;border:1px solid rgba(37,99,235,.2)}

    /* ── CONTENT ── */
    .page{display:none;padding:20px;max-width:900px;margin:0 auto}
    .page.ativa{display:block}

    /* ── CARDS DOS AVISOS ── */
    .aviso-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;box-shadow:var(--sh);transition:all .2s}
    .aviso-card.pendente{border-color:#FECACA;background:#FEF2F2}
    .aviso-card.encontrado,.aviso-card.separado{border-color:#BBF7D0;background:#F0FDF4}
    .aviso-card.subiu{border-color:#99F6E4;background:#F0FDFA}
    .aviso-card.abastecido{border-color:#BFDBFE;background:#EFF6FF}
    .aviso-card.verificando{border-color:#DDD6FE;background:#F5F3FF}
    .aviso-card.protocolo{border-color:#FDE68A;background:#FFFBEB}
    .aviso-card.devolucao{border-color:#E9D5FF;background:#FAF5FF}
    .aviso-card.nao_encontrado{border-color:#DDD6FE;background:#F5F3FF;opacity:.8}

    .aviso-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
    .aviso-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .aviso-card.pendente .aviso-icon{background:#FECACA}
    .aviso-card.encontrado .aviso-icon,.aviso-card.separado .aviso-icon{background:#BBF7D0}
    .aviso-card.subiu .aviso-icon{background:#99F6E4}
    .aviso-card.abastecido .aviso-icon{background:#BFDBFE}
    .aviso-card.verificando .aviso-icon{background:#DDD6FE}
    .aviso-card.protocolo .aviso-icon{background:#FDE68A}
    .aviso-card.devolucao .aviso-icon{background:#E9D5FF}

    .aviso-info{flex:1;min-width:0}
    .aviso-cod{font-size:15px;font-weight:800;color:var(--red);font-family:'Space Mono',monospace}
    .aviso-card.encontrado .aviso-cod,.aviso-card.separado .aviso-cod{color:var(--green)}
    .aviso-card.subiu .aviso-cod{color:var(--teal)}
    .aviso-card.abastecido .aviso-cod{color:var(--accent)}
    .aviso-card.verificando .aviso-cod{color:var(--indigo)}
    .aviso-card.protocolo .aviso-cod{color:var(--amber)}
    .aviso-card.devolucao .aviso-cod{color:var(--purple)}
    .aviso-pedido{font-size:11px;color:var(--text3);margin-left:10px;font-weight:500}
    .aviso-desc{font-size:13px;color:var(--text);margin:4px 0;line-height:1.4}
    .aviso-end{font-size:12px;color:var(--text2);font-weight:600}
    .aviso-qtd{display:inline-block;background:var(--red);color:#fff;border-radius:8px;padding:4px 12px;font-size:18px;font-weight:800;font-family:'Space Mono',monospace;margin-top:6px}
    .aviso-card.encontrado .aviso-qtd,.aviso-card.separado .aviso-qtd{background:var(--green)}
    .aviso-card.subiu .aviso-qtd{background:var(--teal)}
    .aviso-card.abastecido .aviso-qtd{background:var(--accent)}
    .aviso-status-line{font-size:12px;font-weight:700;margin-top:6px}
    .aviso-sep-line{font-size:11px;color:var(--text3);margin-top:2px}

    /* ── QTDE INPUT ── */
    .qtd-row{display:flex;align-items:center;gap:10px;margin:10px 0;padding:10px 12px;background:#fff;border:1.5px solid #FDE68A;border-radius:10px}
    .qtd-row label{font-size:12px;color:var(--amber);font-weight:700;white-space:nowrap}
    .qtd-row input{flex:1;max-width:100px;padding:6px 10px;background:var(--surface2);border:1.5px solid #FDE68A;border-radius:7px;font-size:20px;font-weight:800;font-family:'Space Mono',monospace;color:var(--text);text-align:center;outline:none}
    .qtd-row span{font-size:12px;color:var(--text3);white-space:nowrap}

    /* ── ACTION BUTTONS ── */
    .btns-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    @media(min-width:600px){.btns-grid{grid-template-columns:repeat(6,1fr)}}
    .btn-acao{padding:12px 6px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;color:#fff;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:4px}
    .btn-acao:hover{filter:brightness(1.1);transform:translateY(-1px)}
    .btn-acao .ic{font-size:20px}
    .btn-sep  {background:#16A34A}
    .btn-subiu{background:#0D9488}
    .btn-abast{background:#2563EB}
    .btn-verif{background:#6366F1}
    .btn-proto{background:#D97706}
    .btn-devol {background:#7C3AED}

    /* ── HISTORICO ── */
    .hist-item{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
    .hist-etapa{font-size:11px;font-weight:800;letter-spacing:.8px;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .hist-info{flex:1;min-width:0}
    .hist-pedido{font-size:12px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace}
    .hist-cod{font-size:13px;color:var(--text);margin:2px 0}
    .hist-end{font-size:11px;color:var(--text3)}
    .hist-func{font-size:11px;font-weight:700;color:var(--text2);margin-top:4px}
    .hist-hora{font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;flex-shrink:0}

    /* ── FILTROS ── */
    .filtro-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px 14px;background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--border)}
    .filtro-bar select,.filtro-bar input{padding:7px 11px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
    .filtro-bar select:focus,.filtro-bar input:focus{border-color:var(--accent)}
    .btn-refresh{padding:7px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
    .btn-refresh:hover{border-color:var(--accent);color:var(--accent)}

    /* ── TOAST ── */
    #toast-root{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
    .toast{padding:11px 22px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:var(--sh-lg);max-width:90vw;text-align:center;animation:slideUp .25s ease;white-space:nowrap}
    @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .toast.info   {background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
    .toast.sucesso{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
    .toast.erro   {background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
    .toast.aviso  {background:#FFFBEB;color:#D97706;border:1px solid #FDE68A}

    /* ── PILL ── */
    .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
    .pill.pendente{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
    .pill.encontrado,.pill.separado{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
    .pill.subiu{background:#F0FDFA;color:#0D9488;border:1px solid #99F6E4}
    .pill.abastecido{background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE}
    .pill.verificando{background:#F5F3FF;color:#6366F1;border:1px solid #DDD6FE}
    .pill.protocolo{background:#FFFBEB;color:#D97706;border:1px solid #FDE68A}
    .pill.devolucao{background:#FAF5FF;color:#7C3AED;border:1px solid #E9D5FF}

    .empty{color:var(--text3);text-align:center;padding:48px;font-size:14px}

    @media(max-width:600px){
      .tabs .tab{padding:10px 12px;font-size:12px}
      .page{padding:12px}
    }
  </style>
</head>
<body>

<div id="toast-root"></div>

<header>
  <div class="logo">
    <div class="logo-ic">🔧</div>
    <div class="logo-tx">Reposição<small>WMS — Miess</small></div>
  </div>
  <div id="func-nome-atual" style="display:none"></div>
</header>

<!-- Seletor de funcionário -->
<div id="func-bar">
  <label>👤 COLABORADOR:</label>
  <select id="func-select" onchange="selecionarFuncionario(this.value)">
    <option value="">— Selecione seu nome —</option>
  </select>
</div>

<!-- Abas -->
<div class="tabs">
  <button class="tab ativo" id="tab-solicitacoes" onclick="mudarAba('solicitacoes')">
    🔧 Solicitações <span class="tab-badge" id="badge-pend" style="display:none">0</span>
  </button>
  <button class="tab" id="tab-historico" onclick="mudarAba('historico')">📋 Histórico</button>
</div>

<!-- ══ ABA: SOLICITAÇÕES ══ -->
<div class="page ativa" id="page-solicitacoes">
  <div class="filtro-bar">
    <select id="filtro-status" onchange="carregarAvisos()">
      <option value="">Todos</option>
      <option value="pendente">🔴 Pendente</option>
      <option value="encontrado">✅ Separado</option>
      <option value="subiu">⬆️ Subiu</option>
      <option value="abastecido">📦 Abastecido</option>
      <option value="verificando">🔍 Verificando</option>
      <option value="protocolo">📋 Protocolo</option>
      <option value="devolucao">↩️ Devolução</option>
    </select>
    <span style="font-size:12px;color:var(--red);font-weight:700">🔴 <span id="cnt-pend">0</span> pendentes</span>
    <span style="font-size:12px;color:var(--green);font-weight:600">✅ <span id="cnt-rep">0</span> resolvidos</span>
    <button class="btn-refresh" onclick="carregarAvisos()">🔄 Atualizar</button>
  </div>
  <div id="lista-avisos"><div class="empty">Carregando...</div></div>
</div>

<!-- ══ ABA: HISTÓRICO ══ -->
<div class="page" id="page-historico">
  <div class="filtro-bar">
    <input type="date" id="hist-data" onchange="carregarHistorico()"/>
    <select id="hist-func" onchange="carregarHistorico()">
      <option value="">Todos os funcionários</option>
    </select>
    <button class="btn-refresh" onclick="carregarHistorico()">🔄 Atualizar</button>
  </div>
  <div id="lista-historico"><div class="empty">Selecione uma data</div></div>
</div>

<script>
const API = window.location.origin;
let funcionarioAtivo = '';
let intervalId = null;

// ── Toast ──
function toast(msg, tipo='info') {
  const el = document.createElement('div');
  el.className = `toast ${tipo}`;
  el.textContent = msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Data hoje ──
function hojeLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Carregar funcionários ──
async function carregarFuncionarios() {
  try {
    const res  = await fetch(`${API}/usuarios`);
    const list = await res.json();
    const sel  = document.getElementById('func-select');
    const selH = document.getElementById('hist-func');
    const opts = list.map(f=>`<option value="${f.nome}">${f.nome}</option>`).join('');
    sel.innerHTML  = '<option value="">— Selecione seu nome —</option>' + opts;
    selH.innerHTML = '<option value="">Todos os funcionários</option>' + opts;
    const salvo = localStorage.getItem('rep_funcionario_desktop');
    if (salvo) { sel.value = salvo; selecionarFuncionario(salvo); }
  } catch(e) {}
}

function selecionarFuncionario(nome) {
  funcionarioAtivo = nome;
  localStorage.setItem('rep_funcionario_desktop', nome);
  const badge = document.getElementById('func-nome-atual');
  if (nome) { badge.textContent = `👤 ${nome}`; badge.style.display='block'; }
  else badge.style.display = 'none';
}

// ── Mudar aba ──
function mudarAba(aba) {
  ['solicitacoes','historico'].forEach(a => {
    document.getElementById(`page-${a}`).classList.toggle('ativa', a===aba);
    document.getElementById(`tab-${a}`).classList.toggle('ativo', a===aba);
  });
  if (aba==='historico') carregarHistorico();
  if (aba==='solicitacoes') carregarAvisos();
}

// ── Ícone por status ──
function statusIcon(s) {
  return {pendente:'🔴',encontrado:'✅',separado:'✅',subiu:'⬆️',abastecido:'📦',verificando:'🔍',protocolo:'📋',devolucao:'↩️',nao_encontrado:'🚫'}[s]||'•';
}
function statusLabel(s) {
  return {pendente:'Pendente',encontrado:'Separado',separado:'Separado',subiu:'Subiu',abastecido:'Abastecido',verificando:'Verificando',protocolo:'Protocolo',devolucao:'Devolução',nao_encontrado:'Não encontrado'}[s]||s;
}

// ── Carregar avisos ──
async function carregarAvisos() {
  const filtro = document.getElementById('filtro-status').value;
  let url = `${API}/repositor/avisos`;
  if (filtro) url += `?status=${filtro}`;
  try {
    const res    = await fetch(url);
    const avisos = await res.json();
    const pend   = avisos.filter(a=>a.status==='pendente').length;
    const resol  = avisos.filter(a=>a.status!=='pendente').length;
    document.getElementById('cnt-pend').textContent = pend;
    document.getElementById('cnt-rep').textContent  = resol;
    const badge = document.getElementById('badge-pend');
    badge.textContent = pend; badge.style.display = pend>0?'inline':'none';

    const lista = document.getElementById('lista-avisos');
    if (!avisos.length) { lista.innerHTML = '<div class="empty">✅ Nenhum aviso no momento</div>'; return; }

    lista.innerHTML = avisos.map(a => {
      const isPend = a.status === 'pendente';
      const icon   = statusIcon(a.status);

      const qtdInput = isPend ? `
        <div class="qtd-row">
          <label>Qtde encontrada:</label>
          <input type="number" id="qtd-${a.id}" min="0" max="${a.quantidade||99}" value="${a.quantidade||1}" inputmode="numeric"/>
          <span>de <b>${a.quantidade||'?'}</b></span>
        </div>` : '';

      const btns = isPend ? `
        <div class="btns-grid">
          <button class="btn-acao btn-sep"   onclick="marcar(${a.id},${a.quantidade||0},'separado')">  <span class="ic">✅</span>Separado</button>
          <button class="btn-acao btn-subiu" onclick="marcar(${a.id},${a.quantidade||0},'subiu')">    <span class="ic">⬆️</span>Subiu</button>
          <button class="btn-acao btn-abast" onclick="marcar(${a.id},${a.quantidade||0},'abastecido')"><span class="ic">📦</span>Abastecido</button>
          <button class="btn-acao btn-verif" onclick="marcar(${a.id},0,'verificando')">               <span class="ic">🔍</span>Verificando</button>
          <button class="btn-acao btn-proto" onclick="marcar(${a.id},0,'protocolo')">                 <span class="ic">📋</span>Protocolo</button>
          <button class="btn-acao btn-devol" onclick="marcar(${a.id},0,'devolucao')">                 <span class="ic">↩️</span>Devolução</button>
        </div>` : '';

      const statusLine = !isPend ? `
        <div class="aviso-status-line" style="color:${['encontrado','separado'].includes(a.status)?'var(--green)':a.status==='subiu'?'var(--teal)':a.status==='abastecido'?'var(--accent)':a.status==='verificando'?'var(--indigo)':a.status==='protocolo'?'var(--amber)':'var(--purple)'}">
          ${icon} ${statusLabel(a.status)} às ${a.hora_reposto||'—'}${a.qtd_encontrada>0?' — '+a.qtd_encontrada+' un.':''}
        </div>
        ${a.repositor_nome ? `<div class="aviso-sep-line">👤 ${a.repositor_nome}</div>` : ''}` : '';

      const avisoInfo = isPend ? `<div style="font-size:11px;color:var(--red);font-weight:600;margin-top:4px">⏱ Aviso às ${a.hora_aviso||'—'} • Sep: ${a.separador_nome||'—'}</div>` : '';

      return `<div class="aviso-card ${a.status}">
        <div class="aviso-top">
          <div class="aviso-icon">${icon}</div>
          <div class="aviso-info">
            <div><span class="aviso-cod">${a.codigo||'—'}</span><span class="aviso-pedido">Pedido #${a.numero_pedido}</span></div>
            <div class="aviso-desc">${a.descricao||'—'}</div>
            <div class="aviso-end">📍 ${a.endereco||'—'}</div>
            <span class="aviso-qtd">x${a.quantidade||1}</span>
            ${avisoInfo}
            ${statusLine}
          </div>
        </div>
        ${qtdInput}
        ${btns}
        <div id="hist-${a.id}"></div>
      </div>`;
    }).join('');
    // Carrega histórico de etapas de cada aviso
    for (const a of avisos) { carregarHistoricoAviso(a.id); }
  } catch(e) {
    document.getElementById('lista-avisos').innerHTML = '<div class="empty" style="color:var(--red)">Erro ao carregar</div>';
  }
}

// ── Histórico de etapas por aviso ──
async function carregarHistoricoAviso(avisoId) {
  const el = document.getElementById(`hist-${avisoId}`);
  if (!el) return;
  try {
    const res  = await fetch(`${API}/repositor/historico/${avisoId}`);
    const rows = await res.json();
    if (!rows.length) { el.innerHTML = ''; return; }
    const etapaLabel = {
      separado:'✅ Separado', subiu:'⬆️ Subiu', abastecido:'📦 Abastecido',
      verificando:'🔍 Verificando', protocolo:'📋 Protocolo', devolucao:'↩️ Devolução',
      encontrado:'✅ Separado', nao_encontrado:'🚫 Não encontrado'
    };
    const etapaCor = {
      separado:'#16A34A', subiu:'#0D9488', abastecido:'#2563EB',
      verificando:'#6366F1', protocolo:'#D97706', devolucao:'#7C3AED',
      encontrado:'#16A34A', nao_encontrado:'#DC2626'
    };
    el.innerHTML = `
      <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:8px">
        <div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;margin-bottom:8px">HISTÓRICO DE ETAPAS</div>
        <div style="display:flex;flex-direction:column;gap:0">
          ${rows.map((r,i) => `
            <div style="display:flex;align-items:center;gap:12px;padding:7px 0;${i<rows.length-1?'border-bottom:1px solid var(--border)':''}">
              <div style="display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0">
                <div style="width:10px;height:10px;border-radius:50%;background:${etapaCor[r.etapa]||'var(--text3)'}"></div>
                ${i<rows.length-1?`<div style="width:2px;height:20px;background:var(--border);margin-top:2px"></div>`:''}
              </div>
              <div style="flex:1;min-width:0">
                <span style="font-size:13px;font-weight:700;color:${etapaCor[r.etapa]||'var(--text2)'}">${etapaLabel[r.etapa]||r.etapa}</span>
                ${r.qtd_encontrada>0?`<span style="font-size:12px;color:var(--text3);margin-left:6px">— ${r.qtd_encontrada} un.</span>`:''}
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:13px;font-weight:700;color:var(--text2)">👤 ${r.funcionario||'—'}</div>
                <div style="font-size:11px;color:var(--text3);font-family:'Space Mono',monospace">${r.hora||'—'}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  } catch(e) {}
}

// ── Marcar ação ──
async function marcar(id, qtdTotal, acao) {
  if (!funcionarioAtivo) { toast('Selecione seu nome antes de marcar!','aviso'); return; }
  if (['protocolo','devolucao'].includes(acao) && !confirm(`Confirmar: ${acao==='protocolo'?'Protocolo':'Devolução'}? O supervisor será notificado.`)) return;
  const inputEl = document.getElementById(`qtd-${id}`);
  const qtdEnc  = ['verificando','protocolo','devolucao','nao_encontrado'].includes(acao) ? 0 : (parseInt(inputEl?.value)||qtdTotal||0);
  try {
    const res  = await fetch(`${API}/repositor/avisos/${id}/${acao}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ qtd_encontrada: qtdEnc, repositor_nome: funcionarioAtivo })
    });
    const data = await res.json();
    if (data.erro) { toast(data.erro,'erro'); return; }
    const msgs = { separado:'✅ Separado!', subiu:'⬆️ Subiu!', abastecido:'📦 Abastecido!', verificando:'🔍 Verificando...', protocolo:'📋 Protocolo!', devolucao:'↩️ Devolução!' };
    toast(msgs[acao]||'OK!','sucesso');
    await carregarAvisos();
    carregarHistoricoAviso(id);
  } catch(e) { toast('Erro ao marcar!','erro'); }
}

// ── Carregar histórico ──
async function carregarHistorico() {
  const data  = document.getElementById('hist-data').value;
  const func  = document.getElementById('hist-func').value;
  if (!data) return;

  const lista = document.getElementById('lista-historico');
  lista.innerHTML = '<div class="empty">Carregando...</div>';

  try {
    const res  = await fetch(`${API}/repositor/historico-dia`);
    let rows   = await res.json();
    if (func)  rows = rows.filter(r => r.funcionario === func);

    // Filtra por data local (histórico-dia já filtra por hoje, mas se a data for diferente avisa)
    const hoje = hojeLocal();
    if (data !== hoje) {
      lista.innerHTML = '<div class="empty">O histórico disponível é somente do dia atual. Consulte relatórios para datas anteriores.</div>';
      return;
    }

    if (!rows.length) { lista.innerHTML = '<div class="empty">Nenhuma etapa registrada hoje</div>'; return; }

    const etapaColor = {separado:'#16A34A',subiu:'#0D9488',abastecido:'#2563EB',verificando:'#6366F1',protocolo:'#D97706',devolucao:'#7C3AED',encontrado:'#16A34A',nao_encontrado:'#DC2626'};
    const etapaBg    = {separado:'#F0FDF4',subiu:'#F0FDFA',abastecido:'#EFF6FF',verificando:'#F5F3FF',protocolo:'#FFFBEB',devolucao:'#FAF5FF',encontrado:'#F0FDF4',nao_encontrado:'#F5F3FF'};

    lista.innerHTML = rows.map(r => `
      <div class="hist-item">
        <div class="hist-etapa" style="background:${etapaBg[r.etapa]||'var(--surface2)'};color:${etapaColor[r.etapa]||'var(--text2)'};border:1px solid ${etapaColor[r.etapa]||'var(--border)'}30">
          ${statusIcon(r.etapa)} ${statusLabel(r.etapa)}
        </div>
        <div class="hist-info">
          <div class="hist-pedido">Pedido #${r.numero_pedido||'—'}</div>
          <div class="hist-cod">${r.codigo||'—'} — ${r.descricao||'—'}</div>
          <div class="hist-end">📍 ${r.endereco||'—'}${r.qtd_encontrada>0?' &nbsp;•&nbsp; Qtde: <b>'+r.qtd_encontrada+'</b>':''}</div>
          <div class="hist-func">👤 ${r.funcionario||'—'}</div>
        </div>
        <div class="hist-hora">${r.hora||'—'}</div>
      </div>`).join('');
  } catch(e) {
    lista.innerHTML = '<div class="empty" style="color:var(--red)">Erro ao carregar</div>';
  }
}

// ── Init ──
(async function init() {
  // Define data de hoje nos filtros
  document.getElementById('hist-data').value = hojeLocal();
  await carregarFuncionarios();
  await carregarAvisos();
  // Auto-refresh a cada 20s
  intervalId = setInterval(carregarAvisos, 20000);
})();
</script>
